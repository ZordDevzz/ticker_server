<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Ticker Control Panel</title>
    <style>
        body { font-family: 'Microsoft JhengHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; position: relative; }
        h2 { margin-top: 0; color: #333; text-align: center; margin-bottom: 20px; }
        
        /* Language & Mode Switcher */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .tabs { display: flex; background: #eee; padding: 4px; border-radius: 8px; gap: 4px; }
        .tab { padding: 8px 16px; cursor: pointer; border-radius: 6px; font-size: 0.9rem; font-weight: 600; color: #666; transition: all 0.2s; }
        .tab.active { background: white; color: #007bff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .lang-switch select { padding: 6px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; font-weight: 500; }

        .control-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        input[type="range"] { padding: 0; }
        
        .row { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .row > div { flex: 1; }
        
        .client-list { border: 1px solid #eee; padding: 10px; border-radius: 8px; max-height: 120px; overflow-y: auto; margin-bottom: 1.5rem; background: #fff; }
        .client-item { padding: 10px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; border-bottom: 1px solid #f9f9f9; font-size: 0.85rem; }
        .client-item:hover { background: #f0f7ff; }
        .client-item.selected { background: #007bff; color: white; }

        .toggle-row { display: flex; align-items: center; gap: 10px; cursor: pointer; height: 100%; }
        .toggle-row input { width: auto; margin: 0; }
        
        button { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
        button:hover { background-color: #0056b3; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .status { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: #888; padding: 8px; border-radius: 6px; background: #f8f9fa; border: 1px solid #eee; }
        .status.online { color: #28a745; background: #e8f5e9; border-color: #c8e6c9; }
        
        .manual-link { display: block; text-align: center; margin-top: 20px; color: #007bff; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .manual-link:hover { text-decoration: underline; }

        /* Mode Visibility */
        .advanced-only { display: none; }
        body.mode-advanced .advanced-only { display: block; }
    </style>
</head>
<body class="mode-simple">
    <div class="card">
        <div class="top-bar">
            <div class="tabs">
                <div class="tab active" id="tabSimple" onclick="setMode('simple')">Simple</div>
                <div class="tab" id="tabAdvanced" onclick="setMode('advanced')">Advanced</div>
            </div>
            <div class="lang-switch">
                <select id="langSelector">
                    <option value="en">English</option>
                    <option value="zh">繁體中文</option>
                </select>
            </div>
        </div>

        <h2 id="title">Ticker Control</h2>
        
        <div class="advanced-only">
            <label id="lblSelectClient">1. Select Target Client</label>
            <div class="client-list" id="clientList"></div>
        </div>

        <div class="control-group">
            <label id="lblMsgText" for="text">Message Text</label>
            <input type="text" id="text" placeholder="...">
        </div>

        <div class="row">
            <div>
                <label id="lblSpeed" for="speed">Speed</label>
                <input type="range" id="speed" min="2" max="60" value="20">
            </div>
            <div>
                <label id="lblFontSize" for="fontSize">Font Size (px)</label>
                <input type="number" id="fontSize" value="80">
            </div>
        </div>

        <div class="advanced-only">
            <div class="row">
                <div>
                    <label id="lblTextColor">Text Color</label>
                    <input type="color" id="color" value="#ffffff">
                </div>
                <div>
                    <label id="lblBgColor">Background Color</label>
                    <input type="color" id="bgColor" value="#000000">
                </div>
            </div>

            <div class="row">
                <div>
                    <label id="lblPosition">Vertical Position</label>
                    <select id="position">
                        <option value="top" id="optTop">Top</option>
                        <option value="middle" id="optMiddle">Middle</option>
                        <option value="bottom" id="optBottom">Bottom</option>
                    </select>
                </div>
                <div style="display: flex; flex-direction: column; justify-content: flex-end;">
                    <label class="toggle-row">
                        <input type="checkbox" id="isTransparent" checked> <span id="lblTransparent">Transparent BG</span>
                    </label>
                </div>
            </div>
        </div>

        <button id="sendBtn">Update All Tickers</button>
        <div id="status" class="status">Connecting...</div>
        
        <a href="/manual" target="_blank" class="manual-link" id="linkManual">User Manual</a>
    </div>

    <script>
        const i18n = {
            en: {
                pageTitle: "Ticker Control Panel",
                titleSimple: "Simple Ticker Control",
                titleAdvanced: "Advanced Ticker Control",
                tabSimple: "Simple",
                tabAdvanced: "Advanced",
                lblSelectClient: "1. Select Target Client",
                optBroadcast: "Broadcast to All Clients",
                lblMsgText: "Message Text",
                placeholderText: "Enter scrolling message...",
                lblSpeed: "Speed (Lower = Faster)",
                lblFontSize: "Font Size (px)",
                lblTextColor: "Text Color",
                lblBgColor: "Background Color",
                lblPosition: "Vertical Position",
                optTop: "Top (10%)",
                optMiddle: "Middle (50%)",
                optBottom: "Bottom (90%)",
                lblTransparent: "Transparent BG",
                sendBtnSimple: "Update All Tickers",
                sendBtnAdvanced: "Update Selected Client",
                statusConnecting: "Connecting to Server...",
                statusConnected: "Connected to Server",
                linkManual: "User Manual (Chinese)",
                waiting: "Waiting for clients..."
            },
            zh: {
                pageTitle: "跑馬燈控制面板",
                titleSimple: "簡易跑馬燈控制",
                titleAdvanced: "進階跑馬燈控制",
                tabSimple: "簡易模式",
                tabAdvanced: "進階模式",
                lblSelectClient: "1. 選擇目標客戶端",
                optBroadcast: "廣播至所有客戶端",
                lblMsgText: "訊息文字",
                placeholderText: "輸入捲動訊息...",
                lblSpeed: "滾動速度 (越低越快)",
                lblFontSize: "字體大小 (像素)",
                lblTextColor: "文字顏色",
                lblBgColor: "背景顏色",
                lblPosition: "垂直位置",
                optTop: "頂部 (10%)",
                optMiddle: "居中 (50%)",
                optBottom: "底部 (90%)",
                lblTransparent: "透明背景",
                sendBtnSimple: "更新所有跑馬燈",
                sendBtnAdvanced: "更新所選客戶端",
                statusConnecting: "正在連接伺服器...",
                statusConnected: "已連接至伺服器",
                linkManual: "使用手冊 (繁體中文)",
                waiting: "正在等待客戶端連接..."
            }
        };

        const controls = {
            lang: document.getElementById('langSelector'),
            text: document.getElementById('text'),
            speed: document.getElementById('speed'),
            color: document.getElementById('color'),
            bgColor: document.getElementById('bgColor'),
            fontSize: document.getElementById('fontSize'),
            position: document.getElementById('position'),
            isTransparent: document.getElementById('isTransparent')
        };
        const statusEl = document.getElementById('status');
        const clientListEl = document.getElementById('clientList');
        const sendBtn = document.getElementById('sendBtn');
        let selectedClientId = 'all';
        let currentClients = [];
        let currentMode = 'simple';

        function setMode(mode) {
            currentMode = mode;
            document.body.className = `mode-${mode}`;
            document.getElementById('tabSimple').className = `tab ${mode === 'simple' ? 'active' : ''}`;
            document.getElementById('tabAdvanced').className = `tab ${mode === 'advanced' ? 'active' : ''}`;
            
            if (mode === 'simple') selectedClientId = 'all';
            
            updateLanguage(controls.lang.value);
            saveSettings();
        }

        function loadSettings() {
            const saved = JSON.parse(localStorage.getItem('tickerSettings') || '{}');
            if (saved.mode) setMode(saved.mode);
            if (saved.lang) controls.lang.value = saved.lang;
            if (saved.text !== undefined) controls.text.value = saved.text;
            if (saved.speed) controls.speed.value = saved.speed;
            if (saved.color) controls.color.value = saved.color;
            if (saved.bgColor) controls.bgColor.value = saved.bgColor;
            if (saved.fontSize) controls.fontSize.value = saved.fontSize;
            if (saved.position) controls.position.value = saved.position;
            if (saved.isTransparent !== undefined) controls.isTransparent.checked = saved.isTransparent;
            
            updateLanguage(controls.lang.value);
        }

        function saveSettings() {
            const settings = {
                mode: currentMode,
                lang: controls.lang.value,
                text: controls.text.value,
                speed: controls.speed.value,
                color: controls.color.value,
                bgColor: controls.bgColor.value,
                fontSize: controls.fontSize.value,
                position: controls.position.value,
                isTransparent: controls.isTransparent.checked
            };
            localStorage.setItem('tickerSettings', JSON.stringify(settings));
        }

        function updateLanguage(lang) {
            const t = i18n[lang];
            document.title = t.pageTitle;
            document.getElementById('title').innerText = currentMode === 'simple' ? t.titleSimple : t.titleAdvanced;
            document.getElementById('tabSimple').innerText = t.tabSimple;
            document.getElementById('tabAdvanced').innerText = t.tabAdvanced;
            document.getElementById('lblSelectClient').innerText = t.lblSelectClient;
            document.getElementById('lblMsgText').innerText = t.lblMsgText;
            document.getElementById('text').placeholder = t.placeholderText;
            document.getElementById('lblSpeed').innerText = t.lblSpeed;
            document.getElementById('lblFontSize').innerText = t.lblFontSize;
            document.getElementById('lblTextColor').innerText = t.lblTextColor;
            document.getElementById('lblBgColor').innerText = t.lblBgColor;
            document.getElementById('lblPosition').innerText = t.lblPosition;
            document.getElementById('optTop').innerText = t.optTop;
            document.getElementById('optMiddle').innerText = t.optMiddle;
            document.getElementById('optBottom').innerText = t.optBottom;
            document.getElementById('lblTransparent').innerText = t.lblTransparent;
            sendBtn.innerText = currentMode === 'simple' ? t.sendBtnSimple : t.sendBtnAdvanced;
            document.getElementById('linkManual').innerText = t.linkManual;
            
            if (ws.readyState === WebSocket.OPEN) {
                statusEl.innerText = t.statusConnected;
            } else {
                statusEl.innerText = t.statusConnecting;
            }
            renderClientList();
        }

        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${wsProtocol}//${window.location.host}`);

        ws.onopen = () => {
            statusEl.classList.add('online');
            updateLanguage(controls.lang.value);
            sendUpdate();
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'clientList') {
                currentClients = data.list;
                renderClientList();
            }
        };

        function renderClientList() {
            const t = i18n[controls.lang.value];
            clientListEl.innerHTML = `<div class="client-item ${selectedClientId === 'all' ? 'selected' : ''}" data-id="all">${t.optBroadcast}</div>`;
            
            if (currentClients.length === 0) {
                const empty = document.createElement('div');
                empty.style.padding = "10px";
                empty.style.color = "#999";
                empty.style.textAlign = "center";
                empty.innerText = t.waiting;
                clientListEl.appendChild(empty);
            }

            currentClients.forEach(client => {
                const item = document.createElement('div');
                item.className = `client-item ${selectedClientId === client.id ? 'selected' : ''}`;
                // Display IP Address, Screen Size, and User Agent
                item.innerText = `${client.info.ip} - ${client.info.width}x${client.info.height} (${client.info.ua})`;
                item.onclick = () => {
                    if (currentMode === 'advanced') {
                        selectedClientId = client.id;
                        renderClientList();
                    }
                };
                clientListEl.appendChild(item);
            });
        }

        function sendUpdate() {
            if (ws.readyState === WebSocket.OPEN) {
                const payload = {
                    text: controls.text.value,
                    speed: controls.speed.value,
                    fontSize: controls.fontSize.value,
                    color: controls.color.value,
                    bgColor: controls.bgColor.value,
                    position: controls.position.value,
                    isTransparent: controls.isTransparent.checked
                };

                ws.send(JSON.stringify({
                    type: 'control',
                    targetId: selectedClientId,
                    payload: payload
                }));
                saveSettings();
            }
        }

        controls.lang.onchange = (e) => { updateLanguage(e.target.value); saveSettings(); };
        Object.values(controls).forEach(control => {
            control.addEventListener('input', sendUpdate);
        });
        sendBtn.onclick = sendUpdate;

        loadSettings();
    </script>
</body>
</html>
